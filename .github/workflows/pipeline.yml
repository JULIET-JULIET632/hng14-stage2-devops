name: CI/CD Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install Python linter
        run: pip install flake8

      - name: Lint Python files
        run: flake8 api/main.py worker/worker.py --max-line-length=100

      - name: Install hadolint
        run: |
          wget -O hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
          chmod +x hadolint
          sudo mv hadolint /usr/local/bin/

      - name: Lint Dockerfiles
        run: |
          hadolint api/Dockerfile
          hadolint worker/Dockerfile
          hadolint frontend/Dockerfile

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Install ESLint
        run: run: run: cd frontend && npm install eslint@8 --save-dev

      - name: Lint JavaScript
        run: run: cd frontend && npx eslint app.js

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install fastapi uvicorn redis pytest httpx pytest-cov

      - name: Run tests with coverage
        run: cd api && pytest test_main.py -v --cov=. --cov-report=xml --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: api/coverage.xml

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Start local registry
        run: docker run -d -p 5000:5000 --name registry registry:2

      - name: Build and push API image
        run: |
          docker build -t localhost:5000/api:${{ github.sha }} -t localhost:5000/api:latest ./api
          docker push localhost:5000/api:${{ github.sha }}
          docker push localhost:5000/api:latest

      - name: Build and push worker image
        run: |
          docker build -t localhost:5000/worker:${{ github.sha }} -t localhost:5000/worker:latest ./worker
          docker push localhost:5000/worker:${{ github.sha }}
          docker push localhost:5000/worker:latest

      - name: Build and push frontend image
        run: |
          docker build -t localhost:5000/frontend:${{ github.sha }} -t localhost:5000/frontend:latest ./frontend
          docker push localhost:5000/frontend:${{ github.sha }}
          docker push localhost:5000/frontend:latest

  security-scan:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Start local registry
        run: docker run -d -p 5000:5000 --name registry registry:2

      - name: Build images for scanning
        run: |
          docker build -t localhost:5000/api:latest ./api
          docker build -t localhost:5000/worker:latest ./worker
          docker build -t localhost:5000/frontend:latest ./frontend

      - name: Install Trivy
        run: |
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Scan API image
        run: trivy image --exit-code 1 --severity CRITICAL --format sarif --output api-scan.sarif localhost:5000/api:latest

      - name: Scan worker image
        run: trivy image --exit-code 1 --severity CRITICAL --format sarif --output worker-scan.sarif localhost:5000/worker:latest

      - name: Scan frontend image
        run: trivy image --exit-code 1 --severity CRITICAL --format sarif --output frontend-scan.sarif localhost:5000/frontend:latest

      - name: Upload SARIF results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: "*.sarif"

  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan
    steps:
      - uses: actions/checkout@v4

      - name: Create .env file
        run: |
          echo "REDIS_PASSWORD=testpassword123" > .env
          echo "APP_ENV=production" >> .env
          echo "API_URL=http://api:8000" >> .env

      - name: Start full stack
        run: docker compose up --build -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for services..."
          sleep 30

      - name: Submit a job and poll for completion
        run: |
          JOB_ID=$(curl -s -X POST http://localhost:3000/submit | python3 -c "import sys,json; print(json.load(sys.stdin)['job_id'])")
          echo "Job ID: $JOB_ID"
          for i in $(seq 1 15); do
            STATUS=$(curl -s http://localhost:3000/status/$JOB_ID | python3 -c "import sys,json; print(json.load(sys.stdin).get('status','unknown'))")
            echo "Status: $STATUS"
            if [ "$STATUS" = "completed" ]; then
              echo "Job completed successfully"
              exit 0
            fi
            sleep 2
          done
          echo "Job did not complete in time"
          exit 1

      - name: Tear down stack
        if: always()
        run: docker compose down -v

  deploy:
    runs-on: ubuntu-latest
    needs: integration-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Perform rolling update
        run: |
          docker build -t api:new ./api
          docker build -t worker:new ./worker
          docker build -t frontend:new ./frontend

          for SERVICE in api worker frontend; do
            echo "Rolling update for $SERVICE"
            OLD=$(docker ps -q --filter "name=${SERVICE}" | head -1)
            docker run -d --name ${SERVICE}_new ${SERVICE}:new

            for i in $(seq 1 12); do
              sleep 5
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' ${SERVICE}_new 2>/dev/null)
              if [ "$HEALTH" = "healthy" ]; then
                echo "$SERVICE is healthy, stopping old container"
                [ -n "$OLD" ] && docker stop $OLD && docker rm $OLD
                break
              fi
              if [ $i -eq 12 ]; then
                echo "$SERVICE health check failed, aborting rollout"
                docker stop ${SERVICE}_new && docker rm ${SERVICE}_new
                exit 1
              fi
            done
          done
